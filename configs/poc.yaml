training:
  epochs: 5
  learning_rate: 0.0001
  lr_decay: 0.9999991
  hidden_dim: 64
  num_layers: 8
  batch_size: 1
  device: "cpu"
  checkpoint_dir: "checkpoints"
  log_interval: 100

dataset:
  raw_dir: "data/raw/deforming_plate"
  processed_dir: "data/processed/deforming_plate"

physics:
  bc_node_types: [1, 2, 3]
  bc_loss_weight: 1.0
  stress_loss_weight: 0.1
  smoothness_weight: 0.01
